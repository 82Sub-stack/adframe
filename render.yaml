services:
  - type: web
    name: adframe
    runtime: node
    plan: starter
    buildCommand: npm install && npm run build && cd server && npx puppeteer browsers install chrome
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MOCKUP_CONCURRENCY
        value: "1"
      - key: CAPTURE_MAX_SCROLL_PX
        value: "1600"
      - key: CAPTURE_MAX_HEIGHT
        value: "3400"
      - key: SLOT_SCAN_LIMIT
        value: "900"
      - key: CAPTURE_VIEWPORT_WIDTH
        value: "1366"
      - key: ADTAG_NAV_TIMEOUT_MS
        value: "10000"
      - key: ADTAG_WAIT_MS
        value: "1500"
      - key: PUPPETEER_SINGLE_PROCESS
        value: "false"
      - key: GEMINI_API_KEY
        sync: false
