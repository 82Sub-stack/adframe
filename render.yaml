services:
  - type: web
    name: adframe
    runtime: node
    plan: starter
    buildCommand: npm install && npm run build && cd server && npx puppeteer browsers install chrome
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MOCKUP_CONCURRENCY
        value: "1"
      - key: CAPTURE_MAX_SCROLL_PX
        value: "2200"
      - key: CAPTURE_MAX_HEIGHT
        value: "3600"
      - key: GEMINI_API_KEY
        sync: false
